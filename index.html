<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇小游戏</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --primary: #22c55e;
      --danger: #ef4444;
      --grid: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--text);
    }

    .app {
      width: min(92vw, 560px);
      background: color-mix(in srgb, var(--panel), transparent 10%);
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .stats {
      display: flex;
      gap: 14px;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      color: #0b1020;
      background: var(--primary);
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: #38bdf8;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1/1;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 10px;
      display: block;
    }

    .tips {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
    }

    .status {
      margin-top: 8px;
      min-height: 1.4em;
      font-size: 14px;
      color: #facc15;
      font-weight: 600;
    }

    .game-over {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="header">
      <div class="stats">
        <span>得分：<strong id="score">0</strong></span>
        <span>最高分：<strong id="bestScore">0</strong></span>
      </div>
      <div class="actions">
        <button id="startBtn">开始 / 重新开始</button>
        <button id="pauseBtn" class="secondary" disabled>暂停</button>
      </div>
    </div>

    <canvas id="board" width="500" height="500" aria-label="贪吃蛇棋盘"></canvas>
    <p id="status" class="status">点击“开始”后使用方向键或 WASD 控制。</p>
    <p class="tips">
      规则：吃到红色食物会增长并加分；撞墙或撞到自己则游戏结束。
    </p>
  </main>

  <script>
    const boardSize = 20;
    const board = document.getElementById("board");
    const ctx = board.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestScoreEl = document.getElementById("bestScore");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");

    const cellSize = board.width / boardSize;
    const initialSpeed = 130;
    let loopId = null;
    let isPaused = false;

    const bestKey = "snakeBestScore";
    let bestScore = Number(localStorage.getItem(bestKey) || 0);
    bestScoreEl.textContent = bestScore;

    let snake;
    let direction;
    let pendingDirection;
    let food;
    let score;
    let speed;

    const directionMap = {
      ArrowUp: { x: 0, y: -1 },
      ArrowDown: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 },
      w: { x: 0, y: -1 },
      s: { x: 0, y: 1 },
      a: { x: -1, y: 0 },
      d: { x: 1, y: 0 },
      W: { x: 0, y: -1 },
      S: { x: 0, y: 1 },
      A: { x: -1, y: 0 },
      D: { x: 1, y: 0 },
    };

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 },
      ];
      direction = { x: 1, y: 0 };
      pendingDirection = { ...direction };
      food = randomFood();
      score = 0;
      speed = initialSpeed;
      isPaused = false;
      scoreEl.textContent = score;
      statusEl.classList.remove("game-over");
      statusEl.textContent = "游戏进行中...";
      pauseBtn.disabled = false;
      pauseBtn.textContent = "暂停";
      draw();
    }

    function randomFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * boardSize),
          y: Math.floor(Math.random() * boardSize),
        };
      } while (snake && snake.some((part) => part.x === pos.x && part.y === pos.y));
      return pos;
    }

    function setStatus(text, gameOver = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("game-over", gameOver);
    }

    function drawGrid() {
      ctx.strokeStyle = "#1f2937";
      ctx.lineWidth = 1;
      for (let i = 0; i <= boardSize; i++) {
        const p = i * cellSize;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, board.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(board.width, p);
        ctx.stroke();
      }
    }

    function drawCell({ x, y }, color, radius = 6) {
      const px = x * cellSize;
      const py = y * cellSize;
      const pad = 1.5;
      const size = cellSize - pad * 2;

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(px + pad, py + pad, size, size, radius);
      ctx.fill();
    }

    function draw() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, board.width, board.height);
      drawGrid();

      snake.forEach((part, idx) => {
        drawCell(part, idx === 0 ? "#4ade80" : "#16a34a", idx === 0 ? 7 : 5);
      });
      drawCell(food, "#ef4444", 10);
    }

    function isOpposite(a, b) {
      return a.x + b.x === 0 && a.y + b.y === 0;
    }

    function tick() {
      direction = pendingDirection;
      const nextHead = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y,
      };

      const hitWall =
        nextHead.x < 0 ||
        nextHead.y < 0 ||
        nextHead.x >= boardSize ||
        nextHead.y >= boardSize;
      const hitSelf = snake.some((part) => part.x === nextHead.x && part.y === nextHead.y);

      if (hitWall || hitSelf) {
        stopLoop();
        setStatus("游戏结束！点击“开始 / 重新开始”再来一局。", true);
        pauseBtn.disabled = true;
        return;
      }

      snake.unshift(nextHead);

      if (nextHead.x === food.x && nextHead.y === food.y) {
        score += 10;
        speed = Math.max(70, speed - 2);
        food = randomFood();
        scoreEl.textContent = score;

        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem(bestKey, String(bestScore));
          bestScoreEl.textContent = bestScore;
        }

        restartLoopWithSpeed();
      } else {
        snake.pop();
      }

      draw();
    }

    function stopLoop() {
      if (loopId) {
        clearInterval(loopId);
        loopId = null;
      }
    }

    function restartLoopWithSpeed() {
      stopLoop();
      loopId = setInterval(tick, speed);
    }

    function startGame() {
      initGame();
      restartLoopWithSpeed();
    }

    function togglePause() {
      if (!loopId && !isPaused) {
        return;
      }

      if (isPaused) {
        isPaused = false;
        setStatus("继续游戏中...");
        pauseBtn.textContent = "暂停";
        restartLoopWithSpeed();
      } else {
        isPaused = true;
        stopLoop();
        setStatus("已暂停，点击“暂停”按钮继续。");
        pauseBtn.textContent = "继续";
      }
    }

    document.addEventListener("keydown", (event) => {
      const next = directionMap[event.key];
      if (!next) {
        return;
      }
      event.preventDefault();
      if (isOpposite(next, direction) || isOpposite(next, pendingDirection)) {
        return;
      }
      pendingDirection = next;
    });

    startBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", togglePause);

    draw();
  </script>
</body>
</html>
